<main class="story-detail">
  <div class="page-marker">
    <span class="page-marker__eyebrow">STORY</span>
    <span class="page-marker__sub">ストーリー</span>
  </div>

  <div class="story-detail__stage">
    <div class="story-detail__image char-bg-karena-large" id="storyImage"></div>
  </div>

  <div class="story-detail__info reveal" id="storyInfo">
    <h2 class="story-detail__name" id="storyName">カレナ</h2>
    <p class="story-detail__meta" id="storyMeta">女性・10代後半</p>
    <p class="story-detail__bio" id="storyBio">王都直属の魔導探偵。失われた古代遺物の行方と、それに纏わる事件を専門に追っている。エルザの妹分で、彼女とは深い絆で結ばれている。</p>
  </div>

  <div class="story-detail__tabs" id="storyTabs">
    <button
      class="story-tab is-active"
      data-index="0"
      data-char="karena"
      data-name="カレナ"
      data-meta="女性・10代後半"
      data-bio="王都直属の魔導探偵。失われた古代遺物の行方と、それに纏わる事件を専門に追っている。エルザの妹分で、彼女とは深い絆で結ばれている。">
      <span class="story-tab__avatar char-bg-karena-icon"></span>
      <span class="story-tab__name">カレナ</span>
    </button>
    <button
      class="story-tab"
      data-index="1"
      data-char="lucio"
      data-name="ルシオ"
      data-meta="男性・10代後半"
      data-bio="王都直属の天文魔導士。古代星図と暦の解析に特化し、その魔力波形を研究している。エルザの弟分で、彼女とは深い絆で結ばれている。">
      <span class="story-tab__avatar char-bg-lucio-icon"></span>
      <span class="story-tab__name">ルシオ</span>
    </button>
    <button
      class="story-tab"
      data-index="2"
      data-char="elsa"
      data-name="エルザ"
      data-meta="女性・20代前半"
      data-bio="王都直属の魔導研究員。古代文明の遺物を調査し、その魔力特性を解析している。レオの妹分で、ハンスとは顔なじみ。">
      <span class="story-tab__avatar char-bg-elsa-icon"></span>
      <span class="story-tab__name">エルザ</span>
    </button>
    <button
      class="story-tab"
      data-index="3"
      data-char="iris"
      data-name="イリス"
      data-meta="女性・20代前半"
      data-bio="王都の王立図書館副司書官。カレナに古代の未公開文献を閲覧させるなど、情報面でカレナ、エルザ、ルシオを支援する。カレナとは、互いの専門知識を尊重し合う強力な協力者であり、その絆は深く、探求を共にする無二の盟友である。">
      <span class="story-tab__avatar char-bg-iris-icon"></span>
      <span class="story-tab__name">イリス</span>
    </button>
    <button
      class="story-tab"
      data-index="4"
      data-char="valkyris"
      data-name="ヴァルキリス"
      data-meta="女性・10代後半"
      data-bio="王都直属の魔導技師。カレナの探偵道具や、エルザ・ルシオの天文道具のメンテナンスを担当する技術の天才。三人とは幼なじみであり、ルシオとは同僚以上の複雑な感情を抱く。">
      <span class="story-tab__avatar char-bg-valkyris-icon"></span>
      <span class="story-tab__name">ヴァルキリス</span>
    </button>
    <button
      class="story-tab"
      data-index="5"
      data-char="gaias"
      data-name="ガイアス"
      data-meta="男性・30代前半"
      data-bio="王都から独立した貿易商・探検家。カレナの祖父。カレナの探偵活動を密かに支援する。エルザとルシオとも個人的な親交があり、彼らがエルザ・ルシオとカレナの仲立ちをすることもある。ルシオの父親。">
      <span class="story-tab__avatar char-bg-gaias-icon"></span>
      <span class="story-tab__name">ガイアス</span>
    </button>
  </div>
</main>

  <a href="#top" class="footer__back">Back to page top</a>

</html>
