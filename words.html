<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORDS | 用語解説 - マーダーミステリー</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="page-header" id="top">
  <nav class="navbar">
    <ul class="navbar__list">
      <li><a href="index.html" data-nav="home">HOME</a></li>
      <li><a href="game.html" data-nav="game">GAME</a></li>
      <li><a href="type.html" data-nav="type">TYPE</a></li>
      <li><a href="story.html" data-nav="story">STORY</a></li>
      <li><a href="words.html" data-nav="words">WORDS</a></li>
    </ul>
    <button class="navbar__search" aria-label="検索">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </button>
  </nav>
</header>

<!-- ===== 検索アイコンから開くオーバーレイメニュー ===== -->
<div class="nav-overlay" id="navOverlay" aria-hidden="true">
  <button class="nav-overlay__close" id="navOverlayClose" aria-label="メニューを閉じる">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="6" y1="6" x2="18" y2="18"></line>
      <line x1="18" y1="6" x2="6" y2="18"></line>
    </svg>
  </button>
  <nav class="nav-overlay__menu">
    <a href="index.html" data-nav="home">HOME</a>
    <a href="game.html" data-nav="game">GAME</a>
    <a href="type.html" data-nav="type">TYPE</a>
    <a href="story.html" data-nav="story">STORY</a>
    <a href="words.html" data-nav="words">WORDS</a>
  </nav>
</div>

<main class="word-detail">
  <div class="word-detail__stage-wrap">
    <button class="word-detail__arrow" id="wordPrev" aria-label="前の用語">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline>
      </svg>
    </button>

    <div class="word-detail__stage" id="wordStage">
      <div class="word-card word-card--peek word-card--prev" id="wordPeekPrev"></div>
      <div class="word-card word-card--active" id="wordCurrent">
        <h2 class="word-card__title" id="wordTitle">アリバイ</h2>
        <p class="word-card__desc" id="wordDesc">事件が起きた時間に、どこで何をしていたかを示す証言。</p>
      </div>
      <div class="word-card word-card--peek word-card--next" id="wordPeekNext"></div>
    </div>

    <button class="word-detail__arrow" id="wordNext" aria-label="次の用語">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline>
      </svg>
    </button>
  </div>

  <p class="word-detail__counter" id="wordCounter">1 / 15</p>
</main>

<footer class="footer">
  <a href="#top" class="footer__back">Back to page top</a>
  <p class="footer__tagline">一度きりの推理体験を。</p>
</footer>

<script src="script.js"></script>
</body>
</html>
